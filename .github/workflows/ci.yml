name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-tokens:
    name: Build tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:tokens
      - uses: actions/upload-artifact@v4
        with:
          name: token-build
          path: build/

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: build-tokens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: token-build
          path: build/
      - run: npm run build-storybook
      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 3

